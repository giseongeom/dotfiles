- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- create:
    - ~/.local
    - ~/.ansible

- link:
    ~/.vim: vim/vimfiles
    ~/.vimrc: vim/vimrc
    ~/.ssh/config:
        force: true
        path: ssh/openssh/config
    ~/.zshrc:
        force: true
        path: zsh/zshrc_devcontainer.zsh
    ~/.zprofile:
        force: true
        path: zsh/zprofile_devcontainer.zsh

- shell:
    - [ test -f ~/.ssh/config && chmod 600 ~/.ssh/config ]
