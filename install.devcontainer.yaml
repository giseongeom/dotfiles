- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- link:
    ~/.aws: aws
    ~/.azure: azure
    ~/.gcp: gcp
    ~/.ssh:
        force: true
        relink: true
        path: ssh/devcontainer
    ~/.terraform.d/credentials.tfrc.json : terraform.d/credentials.tfrc.json
    ~/.vim: vim/vimfiles
    ~/.vimrc: vim/vimrc

- create:
    - ~/.local
    - ~/.ansible

- shell:
    - [ test -d ~/.terraform.d || mkdir ~/.terraform.d   ]
    - [ test -f ~/.ssh/config && chmod 600 ~/.ssh/config ]
    - [ chmod 600 ~/.ssh/id* ]
