- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- create:
    - ~/.local
    - ~/.ansible
    - ~/.config/lsd

- link:
    ~/.gitconfig:
        force: true
        if: '[ `uname` = Linux ]'
        path: git/linux_gitconfig
    ~/.gitignore: git/gitignore
    ~/.config/lsd/config.yaml:
        force: true
        if: '[ `uname` = Linux ]'
        path: lsd/linux_config.yaml
    ~/.vim: vim/vimfiles
    ~/.vimrc: vim/vimrc
    ~/.zshrc:
        force: true
        if: '[ `uname` = Linux ]'
        path: zsh/zshrc_linux.zsh
    ~/.zlogout:
        force: true
        if: '[ `uname` = Linux ]'
        path: zsh/zlogout_wsl.zsh
