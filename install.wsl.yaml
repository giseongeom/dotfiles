- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- link:
    ~/.gitconfig: git/gitconfig
    ~/.gitignore: git/gitignore
    ~/.vim: vim/vimfiles
    ~/.vimrc: vim/vimrc
    ~/.zshrc:
        force: true
        relink: true
        if: '[ `uname` = Linux ]'
        path: zsh/zshrc_linux.zsh
    ~/.zlogout:
        force: true
        relink: true
        if: '[ `uname` = Linux ]'
        path: zsh/zlogout_wsl.zsh

- create:
    - ~/.local
    - ~/.ansible

- shell:
