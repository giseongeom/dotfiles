- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- link:
    ~/.gitconfig:
        force: true
        if: '[ `uname` = Darwin ]'
        path: git/mac_gitconfig
    ~/.gitignore:
        force: true
        if: '[ `uname` = Darwin ]'
        path: git/gitignore
    ~/.gvimrc: vim/gvimrc
    ~/.vim: vim/vimfiles
    ~/.vimrc: vim/vimrc
    ~/.zshrc:
        force: true
        relink: true
        if: '[ `uname` = Darwin ]'
        path: zsh/zshrc_darwin.zsh
    ~/.config/lsd/config.yaml:
        force: true
        relink: true
        if: '[ `uname` = Darwin ]'
        path: lsd/mac_config.yaml

- create:
    - ~/.local
    - ~/.ansible
